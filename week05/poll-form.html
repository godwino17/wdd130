<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Form Exercise</title>
    <link rel="stylesheet" href="styles/poll-form.css">
</head>

<body>
    <header>
        <h1>WDD 130 | HTML Form - User Poll</h1>
    </header>

    <main>
        <form>

            <div class="form-item column2">
                <label for="fullname">Full Name:</label>
                <input type="text" name="fullname" id="fullname" placeholder="Godwin Anthony"
                  required>
            </div>
            <div class="form-item column2">
                <label for="useremail">Email:</label>
                <input type="email" id="useremail" name="useremail" placeholder="example1@gmail.com"
                  required>
            </div>

            <div class="form-item column1">
                <label for="browser">What is your favorite browser?</label>
                <select name="browser option question" id="browser">
                    <option value="browser">Chrome</option>
                    <option value="browser">Safari</option>
                    <option value="browser">Edge</option>
                    <option value="browser">Brave</option>
                    <option value="browser">Firefox</option>
                    <option value="browser">Other</option>
                </select>
            </div>

            <div class="form-item column1">
                <label for="pet">Do you have a household pet?</label>
                <input type="checkbox" name="pet question" id="pet">
            </div>

            <div class="form-item">
                <label for="feedback">List the places you have lived: </label>
                <textarea name="feedback" id="feedback" row="4"
                  placeholder="Lisbon, Rome, London, Uyo"></textarea>
            </div>

            <button type="submit">Submit Poll</button>
        </form>

    </main>

    <footer>
        <P>&copy;2026 | HTML Form - User Poll Activity | Godwin Inyang</P>
    </footer>
</body>

</html>
