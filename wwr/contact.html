<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Godwin River Experience - Book your white water rafting trip in Nigeria
        today</title>
    <meta name="description"
      content="Ready to raft? Contact Godwin River Experience to book your trip, ask questions or get a custom quote. Your Nigerian white water rafting adventure awaits">
    <meta name="author" content="Godwin Inyang">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body class="contact">
    <header>
        <nav>
            <img src="images/z-wwr-blue.jpg" alt="White Water Rafting Logo" width="150">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="address">
            <h1>Godwin River Experience</h1>
            <p>123 Main River street</p>
            <p>Uyo, Akwa Ibom state</p>
            <p>+234 999 999 9999</p>
            <p>info@godwinraftingadventure.com</p>
        </section>

        <section class="content">
            <div class="map-div"><iframe
                  src="https://www.google.com/maps/embed?pb=!1m10!1m8!1m3!1d15866.691945009778!2d6.7931651!3d6.1745167!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sng!4v1775139306641!5m2!1sen!2sng"
                  width="600" height="450" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>

            <form>
                <div class="name">
                    <label for="name">Name </label>
                    <input type="text" id="name" name="name" required placeholder="fullname">
                </div>
                <div class="email">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="email">
                </div>
                <div class="radio">
                    <p>Message Purpose</p>
                    <div>
                        <input type="radio" id="inquiry" value="general inquiry" name="purpose">
                        <label for="inquiry">General inquiry</label>
                    </div>
                    <div>
                        <input type="radio" id="question" value="reservation question"
                          name="purpose">
                        <label for="question">Reservation Question</label>
                    </div>
                    <div>
                        <input type="radio" id="suggestion" value="website suggestion"
                          name="purpose">
                        <label for="suggestion">Website Suggestion</label>
                    </div>
                </div>
                <div class="message">
                    <label for="message">Message</label>
                    <textarea name="message" id="message"
                      placeholder="Enter message here"></textarea>
                </div>
                <div class="checkbox">
                    <input type="checkbox" name="newsletter" id="checkbox">
                    <label for="checkbox">Please subscribe me to the
                        monthly
                        newsletter</label>
                </div>
                <button type="submit">Get in Touch!</button>
            </form>
        </section>

        <h2>We Are Here to serve you</h2>
        <div class="contact-us profile">
            <figure>
                <img src="images/aay1.jpg" alt="Riding the rapids">
                <figcaption>Employee Profile</figcaption>
            </figure>
            <figure>
                <img src="images/aay2.jpg" alt="Splashing through adventure">
                <figcaption>Employee Profile</figcaption>
            </figure>
            <figure>
                <img src="images/aay3.jpg" alt="Thrill seekers unite">
                <figcaption>Employee Profile</figcaption>
            </figure>
        </div>
    </main>

    <footer>
        <p>&copy;2026 || Godwin River Experience || Godwin Inyang</p>
        <nav class="socialmedia">
            <a href="https://www.facebook.com"><img src="images/facebook-icon.jpg"
                  alt="Facebook icon"></a>
            <a href="https://www.linkedin.com"><img src="images/linkedln-icon.jpg"
                  alt="Linkedln icon"></a>
            <a href="https://www.instagram.com"><img src="images/instagram-icon.jpg"
                  alt="Instagram icon"></a>
        </nav>
    </footer>

</body>

</html>
